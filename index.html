<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>Орден обітниць</title>
<meta name="theme-color" content="#0a0b11">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Орден">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="manifest" href="manifest.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=EB+Garamond:ital,wght@0,500;1,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ===== Бібліотека SVG (сигіл + іконки обітниць). Малюється векторно. ===== -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <symbol id="sigil" viewBox="0 0 100 100">
      <g class="halo" style="transform-box:fill-box;transform-origin:center">
        <g fill="none" stroke="var(--gold)" stroke-width="1.4" stroke-linecap="round" opacity=".85">
          <path d="M50 5 V14"/><path d="M34 9 l3 8"/><path d="M66 9 l-3 8"/>
          <path d="M22 19 l5 7"/><path d="M78 19 l-5 7"/>
          <path d="M12 33 l7 5"/><path d="M88 33 l-7 5"/>
        </g>
      </g>
      <!-- щит -->
      <path d="M50 22 L78 30 V52 C78 68 65 78 50 86 C35 78 22 68 22 52 V30 Z"
            fill="rgba(205,163,73,.05)" stroke="var(--gold)" stroke-width="1.8" stroke-linejoin="round"/>
      <path d="M50 28 L72 34 V52 C72 64 62 72 50 79 C38 72 28 64 28 52 V34 Z"
            fill="none" stroke="var(--gold)" stroke-width=".7" opacity=".5"/>
      <!-- меч-хрест -->
      <g stroke="var(--gold-2)" stroke-width="2.2" stroke-linecap="round">
        <path d="M50 31 V72"/>
        <path d="M40 44 H60"/>
      </g>
      <circle cx="50" cy="30" r="2.4" fill="var(--gold-2)"/>
      <path d="M50 72 l3.5 5 -3.5 3 -3.5 -3 Z" fill="var(--gold-2)"/>
    </symbol>

    <!-- іконки: тонка лінія, currentColor -->
    <symbol id="i-goblet" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6 4h12l-1.4 6.2A5 5 0 0 1 12 14a5 5 0 0 1-4.6-3.8L6 4Z"/>
      <path d="M12 14v6"/><path d="M8 20h8"/>
    </symbol>
    <symbol id="i-smoke" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 21c-3-2 2-4-1-7s1-5 1-5"/>
      <path d="M16 20c-2-1.4 1.3-2.6-.6-4.6"/>
      <path d="M9 4c0 1.5 1.5 1.8 1.5 3.2"/>
    </symbol>
    <symbol id="i-coin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="8.2"/>
      <path d="M12 7.2v9.6"/><path d="M9.6 9.4h3.2a1.8 1.8 0 0 1 0 3.6H9.6h4"/>
    </symbol>
    <symbol id="i-chain" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9.5 9.5 7.8 7.8a3 3 0 0 0-4.2 4.2l2 2"/>
      <path d="M14.5 14.5l1.7 1.7a3 3 0 0 0 4.2-4.2l-2-2"/>
      <path d="M9 6.5 8 4M6.5 9 4 8M15 17.5l1 2.5M17.5 15l2.5 1"/>
    </symbol>
    <symbol id="i-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 11c3 4 6.5 6 9 6s6-2 9-6"/>
      <path d="M6 14.5 5 17M12 17v2.6M18 14.5 19 17M9 16.4l-.5 2.4M15 16.4l.5 2.4"/>
    </symbol>

    <symbol id="i-feast" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6 3v4.5a2.5 2.5 0 0 0 5 0V3"/><path d="M8.5 3v4.5"/><path d="M8.5 7.5V21"/>
      <path d="M16.5 21V3c2.4 0 3.5 2.6 3.5 6s-1.1 5-3.5 5"/>
    </symbol>
    <symbol id="i-play" viewBox="0 0 24 24" fill="currentColor"><path d="M7 4.5v15l13-7.5z"/></symbol>
  </defs>
</svg>

<!-- ============================ РИТУАЛ ============================ -->
<div class="intro" id="intro" role="button" tabindex="0" aria-label="Пропустити вступ">

  <!-- 1 · дата -->
  <section class="stage date-tablet" id="stDate">
    <svg class="date-frame" viewBox="0 0 320 160" preserveAspectRatio="none" aria-hidden="true">
      <path pathLength="1" d="M14 6 H306 a8 8 0 0 1 8 8 V146 a8 8 0 0 1 -8 8 H14 a8 8 0 0 1 -8 -8 V14 a8 8 0 0 1 8 -8 Z"/>
      <path pathLength="1" d="M30 6 H14 a8 8 0 0 0 -8 8 V30 M290 6 H306 a8 8 0 0 1 8 8 V30 M30 154 H14 a8 8 0 0 1 -8 -8 V130 M290 154 H306 a8 8 0 0 0 8 -8 V130"/>
    </svg>
    <div class="date-weekday" id="dWeekday"></div>
    <div class="date-main" id="dMain"></div>
    <div class="date-year" id="dYear"></div>
  </section>

  <!-- 2 · цитата -->
  <section class="stage" id="stQuote">
    <div class="quote-mark">“</div>
    <p class="quote-text" id="qText"></p>
    <div class="quote-rule"></div>
  </section>

  <!-- 3 · віха -->
  <section class="stage" id="stMs">
    <svg class="ms-sigil"><use href="#sigil"/></svg>
    <div class="ms-kicker">Віха вистояна</div>
    <div class="ms-number" id="msNum"></div>
    <div class="ms-days">днів</div>
    <div class="ms-vow" id="msVow"></div>
    <p class="ms-text" id="msText"></p>
  </section>

  <div class="intro__skip">тап, щоб пропустити</div>
</div>

<!-- ============================ ТАБЛО ============================ -->
<main class="frame">
  <div class="board" id="board">
    <header class="crest">
      <svg class="crest__sigil"><use href="#sigil"/></svg>
      <div class="crest__title" id="crestTitle">ОРДЕН</div>
      <div class="crest__sub" id="crestSub">обітниць</div>
    </header>

    <ul class="oaths" id="oaths"></ul>

    <button class="oath oath--feast" id="feast" type="button">
      <span class="oath__icon"><svg><use href="#i-feast"></use></svg></span>
      <span class="oath__body">
        <span class="oath__name">Трапези</span>
        <span class="oath__sub">тап — відмітити · скидання 1-го</span>
      </span>
      <span class="oath__count"><span class="feast__dots" id="feastDots">—</span></span>
    </button>

    <footer class="board__foot">
      <button class="replay" id="replay"><svg><use href="#i-play"/></svg>програти ритуал</button>
      <span class="board__date" id="footDate"></span>
    </footer>
  </div>
</main>

<!-- ============================ ШТОРКА ============================ -->
<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet" role="dialog" aria-modal="true" aria-labelledby="shTitle">
  <div class="sheet__grip"></div>
  <div class="sheet__head">
    <svg class="sheet__icon" id="shIcon"><use href="#i-coin"/></svg>
    <div>
      <div class="sheet__title" id="shTitle">—</div>
      <div class="sheet__stat" id="shStat">—</div>
    </div>
  </div>
  <div class="sheet__row">
    <label>Наступна віха</label><span id="shNext">—</span>
  </div>
  <div class="sheet__row">
    <label for="shDate">Початок стріку</label>
    <input type="date" id="shDate">
  </div>
  <button class="btn btn--reset" id="shReset">Зрив — обнулити стрік</button>
  <button class="btn btn--ghost" id="shClose">Закрити</button>
</div>

<!-- ========================== ПІДТВЕРДЖЕННЯ ========================== -->
<div class="confirm" id="confirm" role="alertdialog" aria-modal="true">
  <div class="confirm__card">
    <div class="confirm__title">Обнулити «<b id="cfName">—</b>»?</div>
    <p class="confirm__text">Лічильник почне з нуля від сьогодні. Це чесна дія, не покарання — встанеш і підеш далі.</p>
    <button class="btn btn--reset" id="cfYes">Так, я зірвався</button>
    <button class="btn btn--ghost" id="cfNo">Скасувати</button>
  </div>
</div>

<!-- ===================== ТРАПЕЗИ — МЕНЮ ЗМІНИ ===================== -->
<div class="confirm" id="feastModal" role="alertdialog" aria-modal="true">
  <div class="confirm__card">
    <div class="confirm__title">Трапези</div>
    <p class="confirm__text" id="feastText">—</p>
    <button class="btn btn--gold" id="feastYes" type="button">Відмітити (−1)</button>
    <button class="btn btn--ghost" id="feastNo" type="button">Скасувати</button>
  </div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
